<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule Builder</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/constants.js"></script>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input type="text" class="tb-title" id="tbTitle" value="" placeholder="Schedule Title">
      <div class="tb-sep"></div>
      <div class="day-tabs" id="dayTabs"></div>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-primary" id="addEventBtn">+ Event</button>
      <button class="btn" id="addNoteBtn">+ Note</button>
      <button class="btn" id="printBtn">Print</button>
    </div>
  </div>

  <!-- App Body -->
  <div class="app-body">
    <!-- Schedule Preview -->
    <div class="preview-area">
      <div id="scheduleContainer" class="page"></div>
    </div>
    <!-- Inspector Panel -->
    <div class="inspector" id="inspectorPanel"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="js/app-state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui-core.js"></script>
  <script src="js/schema.js"></script>
  <script src="js/data-helpers.js"></script>
  <script src="js/persistence.js"></script>
  <script src="js/render.js"></script>
  <script src="js/print.js"></script>
  <script src="js/events.js"></script>
  <script src="js/inspector.js"></script>
  <script src="data/scheduledata.js"></script>
  <script src="js/init.js"></script>
</body>
</html>
